<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prabir Hansda</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* --- RESET & BACKGROUND --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #FFDEE9 0%, #B5FFFC 100%);
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 110vh;
            padding: 15px;
        }

        /* --- THE MAIN CARD --- */
        .card {
            width: 100%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.9);
            padding: 35px 20px;
            border-radius: 30px;
            border: 4px solid #333;
            box-shadow: 10px 10px 0px #333;
            text-align: center;
            /* Simple CSS Animation (No JS needed) */
            animation: popUp 0.8s ease forwards;
        }

        @keyframes popUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- PROFILE --- */
        .profile-img {
            width: 110px;
            height: 110px;
            margin: 0 auto 15px;
            border: 4px solid #333;
            border-radius: 50%;
            background: #fff;
            overflow: hidden;
            box-shadow: 5px 5px 0px #333;
            animation: bounceIn 1s 0.2s both;
        }

        @keyframes bounceIn {
            0% { transform: scale(0); }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 26px;
            color: #333;
            margin-bottom: 20px;
        }

        /* --- SOCIAL LINKS (MOBILE FRIENDLY) --- */
        .social-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #fff;
            color: #333;
            text-decoration: none;
            padding: 16px;
            border-radius: 20px;
            border: 3px solid #333;
            box-shadow: 5px 5px 0px #333;
            font-weight: 700;
            font-size: 18px;
            transition: 0.3s;
            /* Default display ensures they ARE visible */
            display: flex !important;
            visibility: visible !important;
            opacity: 1 !important;
        }

        /* Hover & Tap Effects */
        .link-item:hover {
            transform: translate(-3px, -3px);
            box-shadow: 8px 8px 0px #333;
            background: #ffd600; /* Yellow pop */
        }

        .link-item:active {
            transform: translate(3px, 3px);
            box-shadow: 0px 0px 0px #333;
        }

        /* Icon Colors */
        .insta i { color: #E1306C; }
        .un i { color: #000; }
        .gh i { color: #333; }
        .fb i { color: #1877F2; }
        .wa i { color: #25D366; }
        .yt i { color: #FF0000; }
        .pp i { color: #003087; }
        
    </style>
</head>
<body>

    <div class="card">
        <div class="profile-img">
            <img src="img.png" alt="Prabir" style="width:100%;">
        </div>

        <h1>Prabir Hansda</h1>

        <div class="social-links">
            <a href="https://instagram.com/prabirhansda2" class="link-item insta">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="https://unsplash.com/@prabirhansda" class="link-item un">
                <i class="fab fa-unsplash"></i> Unsplash
            </a>
            <a href="https://stock.adobe.com/in/contributor/211921772/PRABIR" class="link-item un">
                <i class="" ><img src="https://images.seeklogo.com/logo-png/38/1/adobe-stock-icon-logo-png_seeklogo-380169.png" alt="Adobe Stock" height="20px"></i> Adobe Stock
            </a>
            <a href="https://github.com/prabir-hansda" class="link-item gh">
                <i class="fab fa-github"></i> GitHub
            </a>
            <a href="https://facebook.com/prabirhansda02" class="link-item fb">
                <i class="fab fa-facebook-f"></i> Facebook
            </a>
            
            <a href="https://www.youtube.com/@prabirhansda2" class="link-item yt">
                <i class="fab fa-youtube"></i> YouTube
            </a>
            <a href="https://paypal.me/PRABIRHANSDA?locale.x=en_GB&country.x=IN" class="link-item pp">
                <i class="fab fa-paypal"></i> PayPal
            </a>
        </div>
    </div>

</body>
</html>
