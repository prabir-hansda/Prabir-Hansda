<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToonTime | My Age Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Luckiest+Guy&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #bdbdbd;
      --card-bg: #ffffff;
      --primary: #ff477e; 
      --secondary: #4cc9f0; 
      --accent: #f9c74f; 
      --text: #2d3436;
      --border-size: 4px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Fredoka One', cursive;
      background-color: var(--bg);
      background-image: radial-gradient(#da4545 2.5px, transparent 2.5px);
      background-size: 30px 30px; /* Dotted Background */
      color: var(--text);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #app-container {
      width: 90%;
      max-width: 450px;
      padding: 30px;
      background: var(--card-bg);
      border: var(--border-size) solid var(--text);
      border-radius: 40px;
      box-shadow: 12px 12px 0px var(--text); /* Comic style shadow */
      text-align: center;
      position: relative;
    }

    .title {
      font-family: 'Luckiest Guy', cursive;
      font-size: 1.5rem;
      letter-spacing: 2px;
      color: var(--primary);
      margin-bottom: 20px;
      text-shadow: 2px 2px 0px var(--text);
    }

    /* Main Big Number */
    .years-wrap {
      background: var(--accent);
      padding: 20px;
      border-radius: 30px;
      border: var(--border-size) solid var(--text);
      margin-bottom: 25px;
      transform: rotate(-2deg); /* Slightly tilted for "toon" effect */
    }

    #years {
      font-size: 5.5rem;
      color: white;
      text-shadow: 5px 5px 0px var(--text);
      display: inline-block;
    }

    .years-label {
      font-size: 1.2rem;
      color: var(--text);
      display: block;
    }

    /* Cartoon Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
    }

    .stat-card {
      padding: 15px;
      background: white;
      border: 3px solid var(--text);
      border-radius: 20px;
      transition: transform 0.2s;
    }

    .stat-card:nth-child(odd) { transform: rotate(2deg); background: #9bf6ff; }
    .stat-card:nth-child(even) { transform: rotate(-2deg); background: #bdb2ff; }

    .val {
      display: block;
      font-size: 1.8rem;
      color: var(--text);
    }

    .unit {
      font-size: 0.8rem;
      text-transform: uppercase;
      color: rgba(0,0,0,0.6);
    }

    /* Animated Seconds */
    .sec-container {
      grid-column: span 2;
      background: var(--primary) !important;
      transform: rotate(0deg) !important;
    }

    #seconds {
      color: white;
      font-size: 2.5rem;
      text-shadow: 3px 3px 0px var(--text);
    }

    /* Bouncing Animation for Seconds */
    .bounce {
      animation: toon-bounce 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes toon-bounce {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    /* Progress Bar */
    .progress-track {
      width: 100%;
      height: 20px;
      background: #eee;
      margin-top: 30px;
      border: 3px solid var(--text);
      border-radius: 10px;
      overflow: hidden;
    }

    #progress-fill {
      height: 100%;
      width: 0%;
      background: repeating-linear-gradient(
        45deg,
        var(--accent),
        var(--accent) 10px,
        #fbc531 10px,
        #fbc531 20px
      );
      transition: width 1s linear;
    }

    @media (max-width: 400px) {
      #years { font-size: 3.5rem; }
      #app-container { padding: 20px; }
    }
  </style>
</head>
<body>

  <main id="app-container">
    <div class="title">I'm Growing Up!</div>
    
    <div class="years-wrap">
      <div id="years">00</div>
      <span class="years-label">Years Old</span>
    </div>

    <div class="grid">
      <div class="stat-card">
        <span id="months" class="val">0</span>
        <span class="unit">Months</span>
      </div>
      <div class="stat-card">
        <span id="days" class="val">0</span>
        <span class="unit">Days</span>
      </div>
      <div class="stat-card">
        <span id="hours" class="val">00</span>
        <span class="unit">Hours</span>
      </div>
      <div class="stat-card">
        <span id="minutes" class="val">00</span>
        <span class="unit">Mins</span>
      </div>
      <div class="stat-card sec-container">
        <span id="seconds" class="val">00</span>
        <span class="unit" style="color: white;">Seconds to Go!</span>
      </div>
    </div>

    <div class="progress-track">
      <div id="progress-fill"></div>
    </div>
  </main>

  <script>
    // Birth Date Setup
    const BIRTH_DATE = new Date(2004, 7, 22, 13, 30); 

    function update() {
      const now = new Date();
      let y = now.getFullYear() - BIRTH_DATE.getFullYear();
      let m = now.getMonth() - BIRTH_DATE.getMonth();
      let d = now.getDate() - BIRTH_DATE.getDate();
      let h = now.getHours() - BIRTH_DATE.getHours();
      let min = now.getMinutes() - BIRTH_DATE.getMinutes();
      let s = now.getSeconds() - BIRTH_DATE.getSeconds();

      if (s < 0) { s += 60; min--; }
      if (min < 0) { min += 60; h--; }
      if (h < 0) { h += 24; d--; }
      if (d < 0) {
        d += new Date(now.getFullYear(), now.getMonth(), 0).getDate();
        m--;
      }
      if (m < 0) { m += 12; y--; }

      // Update values
      document.getElementById('years').innerText = y;
      document.getElementById('months').innerText = m;
      document.getElementById('days').innerText = d;
      document.getElementById('hours').innerText = h.toString().padStart(2, '0');
      document.getElementById('minutes').innerText = min.toString().padStart(2, '0');
      
      const secEl = document.getElementById('seconds');
      if(secEl.innerText != s) {
          secEl.innerText = s.toString().padStart(2, '0');
          // Add bounce effect on every second tick
          secEl.classList.remove('bounce');
          void secEl.offsetWidth; // Trigger reflow
          secEl.classList.add('bounce');
      }

      // Striped Progress Bar Update
      document.getElementById('progress-fill').style.width = (s / 60 * 100) + "%";
    }

    setInterval(update, 1000);
    update();
  </script>
</body>
</html>
